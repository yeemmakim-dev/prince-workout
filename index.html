<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#1A1A2E">
<title>왕자 수련</title>
<link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{--c:#4B7BEC;--c2:#6C9BF2;--c3:#A8C5F7;--c4:#7C5CFC;--c5:#5FA0E8;--cl:#F0F4FF;--cd:#2D5BB0;--bg:#0F0F1A;--sf:#1A1A2E;--sf2:#16213E;--tx:#E8F0FF;--tm:#8898C0;--th:#506080;--bd:rgba(75,123,236,.18);--r:16px;--r2:20px;--glow:0 4px 20px rgba(75,123,236,.15);--str:#FF6B4A;--sta:#4BC8A4;--gold:#FFD700;--xp:#A78BFA}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overscroll-behavior:none}
body{font-family:'Noto Sans KR','Gowun Batang',-apple-system,sans-serif;background:var(--bg);color:var(--tx);background-image:radial-gradient(circle at 20% 10%,rgba(75,123,236,.08) 0%,transparent 50%),radial-gradient(circle at 80% 90%,rgba(124,92,252,.06) 0%,transparent 50%)}
#app{max-width:480px;margin:0 auto;min-height:100dvh;padding:env(safe-area-inset-top) 16px 80px;overflow-y:auto;-webkit-overflow-scrolling:touch}

@keyframes floaty{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
@keyframes twinkle{0%,100%{opacity:.4;transform:scale(.8)}50%{opacity:1;transform:scale(1.2)}}
@keyframes bounceIn{0%{transform:scale(.3);opacity:0}50%{transform:scale(1.05)}70%{transform:scale(.95)}100%{transform:scale(1);opacity:1}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes jelly{0%,100%{transform:scale(1)}25%{transform:scale(.95,1.05)}50%{transform:scale(1.05,.95)}75%{transform:scale(.98,1.02)}}
@keyframes slideUp{0%{transform:translateY(20px);opacity:0}100%{transform:translateY(0);opacity:1}}
@keyframes glow{0%,100%{box-shadow:0 0 8px rgba(75,123,236,.3)}50%{box-shadow:0 0 20px rgba(75,123,236,.6)}}
@keyframes statPop{0%{transform:scale(1)}50%{transform:scale(1.3)}100%{transform:scale(1)}}
@keyframes unlockShine{0%{background-position:-200% 0}100%{background-position:200% 0}}

.tabs{position:fixed;bottom:0;left:0;right:0;background:linear-gradient(180deg,rgba(15,15,26,0),var(--bg) 15%);border-top:1px solid rgba(75,123,236,.1);display:flex;justify-content:center;z-index:100;padding:6px 0 env(safe-area-inset-bottom);backdrop-filter:blur(12px)}
.tabs-inner{display:flex;max-width:480px;width:100%}
.tab{flex:1;padding:8px 0;text-align:center;font-size:10px;color:var(--th);border:none;background:none;cursor:pointer;font-family:inherit;transition:all .2s}
.tab-icon{font-size:20px;display:block;margin-bottom:2px}
.tab.active{color:var(--c);font-weight:700}
.tab.active .tab-icon{animation:jelly .5s ease}

/* === STAT BAR (RPG style) === */
.stat-bar{display:flex;gap:8px;margin:12px 0;padding:10px;background:linear-gradient(135deg,rgba(26,26,46,.9),rgba(22,33,62,.9));border-radius:var(--r);border:1px solid rgba(75,123,236,.15);box-shadow:0 2px 12px rgba(0,0,0,.3)}
.stat-item{flex:1;text-align:center}
.stat-icon{font-size:18px;display:block}
.stat-label{font-size:10px;color:var(--th);font-weight:700;letter-spacing:1px;margin-top:1px}
.stat-val{font-size:20px;font-weight:900;margin-top:2px}
.stat-val.str{color:var(--str)}
.stat-val.sta{color:var(--sta)}
.stat-val.lv{background:linear-gradient(135deg,var(--gold),#FFA500);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.stat-avail{font-size:9px;color:var(--th);margin-top:1px}

/* === HEADER === */
.header{padding:16px 0 4px;text-align:center}
.header h1{font-size:24px;font-weight:900;letter-spacing:2px;background:linear-gradient(135deg,#fff,var(--c3));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.routine-label{font-size:15px;font-weight:700;margin:4px 0;color:var(--c3)}

/* === CYCLE BAR === */
.cycle-bar{display:flex;gap:4px;margin:10px 0;padding:8px 10px;background:rgba(26,26,46,.8);border-radius:var(--r);border:1px solid rgba(75,123,236,.1)}
.cycle-step{flex:1;text-align:center;padding:6px 4px;border-radius:12px;font-size:9px;color:var(--th);line-height:1.3;transition:all .3s}
.cycle-step.now{background:linear-gradient(135deg,var(--c),var(--c4));color:#fff;font-weight:700;transform:scale(1.08);box-shadow:0 2px 10px rgba(75,123,236,.4)}
.cycle-step.done-step{color:var(--c);font-weight:600}
.cycle-step .step-icon{font-size:14px;display:block;margin-bottom:1px}

/* === POINT GAIN BANNER === */
.point-type-str{color:var(--str);font-weight:900}
.point-type-sta{color:var(--sta);font-weight:900}

/* === WEIGHT ROW === */
.weight-row{display:flex;align-items:center;gap:8px;background:rgba(26,26,46,.8);border-radius:var(--r);padding:10px 14px;margin:8px 0;border:1px solid rgba(75,123,236,.1)}
.weight-row .wv{font-size:18px;font-weight:900;flex:1;color:var(--c3)}
.weight-row .wv span{font-size:11px;color:var(--th);font-weight:400}
.weight-row input{width:64px;border:2px solid rgba(75,123,236,.2);border-radius:10px;padding:6px;font-size:14px;text-align:center;background:rgba(15,15,26,.8);color:var(--tx);font-family:inherit}
.weight-row input:focus{border-color:var(--c);outline:none;box-shadow:0 0 0 3px rgba(75,123,236,.15)}
.weight-row button{background:linear-gradient(135deg,var(--c),var(--c4));color:#fff;border:none;border-radius:10px;padding:7px 14px;font-size:13px;font-weight:700;font-family:inherit;cursor:pointer}

/* === EXERCISE CARDS === */
.ex-list{display:flex;flex-direction:column;gap:8px;margin:8px 0}
.ex-card{background:rgba(26,26,46,.9);border-radius:var(--r);padding:14px;border:1px solid rgba(75,123,236,.1);transition:all .3s}
.ex-card.done{opacity:.4;border-color:rgba(75,123,236,.3);background:rgba(26,26,46,.5)}
.ex-card.done .ex-name{text-decoration:line-through;color:var(--c)}
.ex-name{font-size:15px;font-weight:900;margin-bottom:3px}
.ex-desc{font-size:12px;color:var(--tm);margin-bottom:8px}
.ex-sets{display:flex;gap:6px;flex-wrap:wrap}
.set-btn{width:38px;height:38px;border-radius:50%;border:2px solid rgba(75,123,236,.25);background:rgba(15,15,26,.8);font-size:12px;font-weight:900;color:var(--c3);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;font-family:inherit}
.set-btn.done{background:linear-gradient(135deg,var(--c),var(--c4));border-color:transparent;color:#fff;transform:scale(1.1);box-shadow:0 2px 10px rgba(75,123,236,.4);animation:bounceIn .3s ease}
.set-btn:active{transform:scale(.8)}
.how-btn{font-size:11px;color:var(--c3);background:none;border:none;cursor:pointer;font-family:inherit;margin-top:8px;padding:0;font-weight:600}
.how-text{font-size:11px;color:var(--tm);line-height:1.6;margin-top:6px;white-space:pre-line;display:none;background:rgba(75,123,236,.04);padding:8px;border-radius:10px}

/* === REST TIMER === */
.rest-timer{margin-top:8px;padding:8px 10px;background:rgba(15,15,26,.6);border-radius:12px;display:flex;align-items:center;gap:8px;border:1px solid rgba(75,123,236,.1);animation:bounceIn .3s ease}
.rest-timer-bar{flex:1;height:6px;background:rgba(75,123,236,.1);border-radius:3px;overflow:hidden}
.rest-timer-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--c),var(--c4));width:0%;transition:width .3s linear}
.rest-timer-text{font-size:12px;font-weight:900;color:var(--c3);min-width:36px;text-align:right}
.rest-timer.done-timer{border-color:rgba(76,200,164,.2)}
.rest-timer.done-timer .rest-timer-fill{background:linear-gradient(90deg,var(--sta),#2DD4BF)}
.rest-timer.done-timer .rest-timer-text{color:var(--sta);animation:jelly .5s ease}

/* === PROGRESS === */
.progress-bar{height:8px;background:rgba(75,123,236,.1);border-radius:4px;margin:10px 0 6px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--c),var(--c4));border-radius:4px;transition:width .3s}
.progress-text{font-size:12px;color:var(--tm);text-align:center;margin-bottom:10px;font-weight:600}

/* === CARDIO CARD === */
.walk-card{text-align:center;padding:32px 16px;margin:12px 0;background:rgba(26,26,46,.9);border-radius:var(--r2);border:1px solid rgba(75,123,236,.15)}
.walk-card h2{font-size:20px;margin-bottom:6px;font-weight:900}
.walk-card p{font-size:13px;color:var(--tm);line-height:1.5;margin-bottom:14px}

/* === DONE CARD === */
.done-card{text-align:center;padding:28px 16px;margin:12px 0;animation:bounceIn .5s ease}
.done-card h2{font-size:26px;margin-bottom:8px;animation:jelly .8s ease}
.done-card p{font-size:13px;color:var(--tm);margin-bottom:16px;line-height:1.5}
.done-btns{display:flex;flex-direction:column;gap:8px}

/* === BUTTONS === */
.btn-primary{padding:14px;background:linear-gradient(135deg,var(--c),var(--c4));color:#fff;border:none;border-radius:var(--r);font-size:15px;font-weight:900;cursor:pointer;font-family:inherit;width:100%;box-shadow:0 4px 16px rgba(75,123,236,.3);transition:all .15s;letter-spacing:.5px}
.btn-primary:active{transform:scale(.96)}
.btn-ghost{padding:12px;background:rgba(75,123,236,.08);border:2px solid rgba(75,123,236,.2);border-radius:var(--r);font-size:14px;color:var(--c3);cursor:pointer;font-family:inherit;width:100%;font-weight:600;transition:all .15s}
.btn-ghost:active{transform:scale(.96);background:rgba(75,123,236,.15)}
.btn-skip{padding:10px;background:rgba(26,26,46,.6);border:2px dashed rgba(75,123,236,.15);border-radius:var(--r);font-size:13px;color:var(--th);cursor:pointer;font-family:inherit;width:100%;margin-top:4px;transition:all .15s}
.btn-skip:active{transform:scale(.96)}

/* === SHOP === */
.shop-header{text-align:center;margin:16px 0 12px}
.shop-header h2{font-size:22px;font-weight:900;background:linear-gradient(135deg,var(--gold),#FFA500);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.shop-header p{font-size:12px;color:var(--tm);margin-top:4px}

.shop-grid{display:flex;flex-direction:column;gap:10px}
.shop-item{background:rgba(26,26,46,.9);border-radius:var(--r);padding:14px;border:1px solid rgba(75,123,236,.12);position:relative;overflow:hidden;transition:all .3s}
.shop-item.unlocked{border-color:var(--gold);box-shadow:0 0 20px rgba(255,215,0,.15)}
.shop-item-top{display:flex;gap:12px;align-items:center}
.shop-item-img{width:64px;height:64px;border-radius:12px;object-fit:cover;border:2px solid rgba(75,123,236,.2);flex-shrink:0}
.shop-item-img.locked{filter:brightness(.5) saturate(.3)}
.shop-item.unlocked .shop-item-img{border-color:var(--gold);filter:none}
.shop-item-info{flex:1;min-width:0}
.shop-item-name{font-size:15px;font-weight:900;margin-bottom:2px}
.shop-item-price{font-size:12px;color:var(--tm)}
.shop-item-cost{display:flex;gap:8px;margin-top:6px;font-size:11px}
.shop-item-cost span{padding:3px 8px;border-radius:8px;font-weight:700}
.cost-str{background:rgba(255,107,74,.12);color:var(--str)}
.cost-sta{background:rgba(75,200,164,.12);color:var(--sta)}
.shop-item-progress{margin-top:10px}
.shop-prog-row{display:flex;align-items:center;gap:6px;margin-top:4px}
.shop-prog-label{font-size:10px;font-weight:700;width:28px;text-align:center}
.shop-prog-label.str{color:var(--str)}
.shop-prog-label.sta{color:var(--sta)}
.shop-prog-bar{flex:1;height:6px;background:rgba(255,255,255,.06);border-radius:3px;overflow:hidden}
.shop-prog-fill-str{height:100%;background:linear-gradient(90deg,var(--str),#FF8A6B);border-radius:3px;transition:width .3s}
.shop-prog-fill-sta{height:100%;background:linear-gradient(90deg,var(--sta),#6BE8C4);border-radius:3px;transition:width .3s}
.shop-prog-num{font-size:10px;color:var(--th);font-weight:600;min-width:32px;text-align:right}
.shop-invest-btns{display:flex;gap:6px;margin-top:8px}
.invest-btn{flex:1;padding:8px;border-radius:10px;font-size:12px;font-weight:700;border:none;cursor:pointer;font-family:inherit;transition:all .15s}
.invest-btn:active{transform:scale(.94)}
.invest-btn.str{background:linear-gradient(135deg,var(--str),#FF8A6B);color:#fff}
.invest-btn.sta{background:linear-gradient(135deg,var(--sta),#6BE8C4);color:#fff}
.invest-btn:disabled{opacity:.3;cursor:not-allowed}
.shop-unlocked-badge{display:inline-block;padding:4px 12px;background:linear-gradient(135deg,var(--gold),#FFA500);color:#1A1A2E;border-radius:10px;font-size:12px;font-weight:900;margin-top:8px;animation:jelly .5s ease}
.shop-add-btn{margin-top:10px;padding:14px;background:rgba(255,215,0,.06);border:2px dashed rgba(255,215,0,.2);border-radius:var(--r);text-align:center;cursor:pointer;font-family:inherit;color:var(--gold);font-size:14px;font-weight:700;transition:all .15s;width:100%}
.shop-add-btn:active{transform:scale(.96);background:rgba(255,215,0,.12)}
.shop-empty{text-align:center;padding:40px 20px;color:var(--th)}
.shop-empty-icon{font-size:48px;margin-bottom:12px;animation:floaty 3s ease-in-out infinite}

/* === CALENDAR === */
.cal-month{text-align:center;font-size:17px;font-weight:900;margin:16px 0 12px;display:flex;align-items:center;justify-content:center;gap:14px;color:var(--c3)}
.cal-nav{background:rgba(75,123,236,.1);border:1px solid rgba(75,123,236,.2);font-size:16px;cursor:pointer;color:var(--c3);padding:6px 12px;border-radius:10px;transition:all .15s}
.cal-nav:active{transform:scale(.9)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:14px}
.cal-day-header{text-align:center;font-size:10px;color:var(--th);padding:4px 0;font-weight:700}
.cal-day{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:12px;font-size:12px;color:var(--tm);cursor:pointer;transition:all .2s;position:relative;font-weight:500}
.cal-day:active{transform:scale(.85)}
.cal-day.today{font-weight:900;color:var(--tx);background:rgba(75,123,236,.1)}
.cal-day.has-record{background:rgba(75,123,236,.12);color:var(--c3);font-weight:700}
.cal-day.has-record::after{content:'';width:5px;height:5px;border-radius:50%;background:var(--c);position:absolute;bottom:3px}
.cal-day.selected{background:linear-gradient(135deg,var(--c),var(--c4));color:#fff;font-weight:900}
.cal-day.selected::after{background:#fff}
.cal-detail{background:rgba(26,26,46,.9);border-radius:var(--r);padding:14px;margin:8px 0;border:1px solid rgba(75,123,236,.1);animation:bounceIn .3s ease}
.cal-detail-title{font-size:13px;font-weight:900;margin-bottom:6px;color:var(--c3)}
.cal-detail-item{font-size:12px;color:var(--tm);padding:4px 0}

/* === WEIGHT/RECORDS === */
.wt-current{text-align:center;padding:20px 0}
.wt-current .wt-num{font-size:44px;font-weight:900;background:linear-gradient(135deg,var(--c),var(--c4));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.wt-current .wt-unit{font-size:13px;color:var(--tm)}
.wt-input-row{display:flex;gap:8px;margin:0 0 14px;align-items:center}
.wt-input-row input{flex:1;border:2px solid rgba(75,123,236,.2);border-radius:var(--r);padding:12px;font-size:15px;text-align:center;background:rgba(15,15,26,.8);color:var(--tx);font-family:inherit}
.wt-input-row input:focus{border-color:var(--c);outline:none;box-shadow:0 0 0 3px rgba(75,123,236,.12)}
.wt-input-row button{background:linear-gradient(135deg,var(--c),var(--c4));color:#fff;border:none;border-radius:var(--r);padding:12px 20px;font-size:14px;font-weight:900;font-family:inherit;cursor:pointer}
.wt-chart{background:rgba(26,26,46,.8);border-radius:var(--r);padding:14px;margin:12px 0;border:1px solid rgba(75,123,236,.1)}
.wt-chart canvas{width:100%;height:200px}
.wt-list{margin:12px 0}
.wt-item{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid rgba(75,123,236,.06);font-size:13px}
.wt-item .wt-d{color:var(--th)}

/* === MODALS === */
.skip-modal{position:fixed;inset:0;background:rgba(10,10,20,.8);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(8px)}
.skip-box{background:linear-gradient(150deg,#1A1A2E,#16213E);border:1px solid rgba(75,123,236,.2);border-radius:var(--r2);padding:24px;max-width:340px;width:100%;text-align:center;box-shadow:0 10px 40px rgba(0,0,0,.4);animation:bounceIn .3s ease}
.skip-box h3{font-size:18px;margin-bottom:8px;font-weight:900;color:var(--c3)}
.skip-box p{font-size:13px;color:var(--tm);margin-bottom:14px;line-height:1.6}
.skip-count{font-size:28px;font-weight:900;background:linear-gradient(135deg,var(--c),var(--c4));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;display:block;margin:8px 0}
.skip-btns{display:flex;gap:8px}
.skip-btns button{flex:1;padding:12px;border-radius:12px;font-size:14px;font-weight:700;border:none;cursor:pointer;font-family:inherit;transition:transform .15s}
.skip-btns button:active{transform:scale(.92)}

/* === COMPLETE POPUP === */
.complete-popup{position:fixed;inset:0;background:rgba(10,10,20,.85);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(8px)}
.complete-box{background:linear-gradient(150deg,#1A1A2E,#16213E);border:1px solid rgba(75,123,236,.2);border-radius:var(--r2);padding:24px;max-width:340px;width:100%;text-align:center;box-shadow:0 10px 40px rgba(0,0,0,.4);animation:bounceIn .4s ease}
.complete-box h3{font-size:20px;margin-bottom:12px;font-weight:900}
.complete-item{font-size:13px;color:var(--tm);line-height:2;text-align:left;padding:0 8px}
.complete-item b{font-weight:700}
.stat-gain{font-size:32px;font-weight:900;margin:14px 0;animation:statPop .5s ease}
.stat-gain.str{color:var(--str)}
.stat-gain.sta{color:var(--sta)}
.complete-comment{font-size:12px;color:var(--tm);margin:10px 0;padding:8px 10px;background:rgba(75,123,236,.06);border-radius:10px;line-height:1.6;border-left:3px solid var(--c);font-style:italic;text-align:left}

/* === UNLOCK POPUP === */
.unlock-box{border-color:var(--gold)!important;box-shadow:0 0 40px rgba(255,215,0,.15),0 10px 40px rgba(0,0,0,.4)!important}
.unlock-title{font-size:24px;font-weight:900;background:linear-gradient(135deg,var(--gold),#FFA500);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:4px}
.unlock-item-name{font-size:18px;font-weight:900;color:var(--c3);margin:6px 0}

/* === CROP === */
.crop-modal{position:fixed;inset:0;background:rgba(10,10,20,.95);z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;backdrop-filter:blur(10px)}
.crop-title{color:#fff;font-size:14px;margin-bottom:12px;font-weight:700}
.crop-area{width:200px;height:200px;overflow:hidden;border-radius:16px;border:2px solid var(--c);position:relative;touch-action:none;cursor:grab}
.crop-area img{position:absolute;max-width:none;max-height:none;user-select:none;-webkit-user-drag:none}
.crop-btns{display:flex;gap:12px;margin-top:16px}
.crop-btns button{padding:10px 24px;border-radius:14px;font-size:14px;font-weight:900;border:none;cursor:pointer;font-family:inherit}
.crop-save{background:linear-gradient(135deg,var(--c),var(--c4));color:#fff}
.crop-cancel{background:rgba(255,255,255,.1);color:#fff;border:1px solid rgba(255,255,255,.2)!important}

/* === MISC === */
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);background:linear-gradient(135deg,var(--c),var(--c4));color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:700;opacity:0;transition:all .3s;pointer-events:none;z-index:999;box-shadow:0 4px 16px rgba(75,123,236,.4)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);animation:jelly .4s ease}
.confetti{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:1000}
.confetti-piece{position:absolute;border-radius:3px;animation:confettiFall 2.5s ease-in forwards}
@keyframes confettiFall{0%{opacity:1;transform:translateY(-20px) rotate(0deg)}50%{opacity:1}100%{opacity:0;transform:translateY(100vh) rotate(1080deg) scale(.5)}}

function seededRand(seed){return function(){seed=(seed*16807+0)%2147483647;return(seed-1)/2147483646}}
function pickRandom(arr,n,rng){
var a=arr.slice();var res=[];
for(var i=0;i<n&&a.length;i++){var idx=Math.floor(rng()*a.length);res.push(a.splice(idx,1)[0])}
return res;
}
function generateRoutine(idx){
var seed=idx*7919+31;
var rng=seededRand(seed);
var labels=['A','C','B'];
var icons=['⚔️','🗡️','🛡️'];
var li=idx%3;
var base=[
pickRandom(POOL.compound,1,rng)[0],
pickRandom(POOL.hinge,1,rng)[0],
pickRandom(rng()<0.5?POOL.pull:POOL.push,1,rng)[0],
pickRandom(POOL.core,1,rng)[0]
];
var exercises=base.map(function(ex,i){
var key=idx+'_'+i;
if(S.swapped&&S.swapped[key]){return S.swapped[key]}
return ex;
});
return {type:'strength',name:'근력 수련 '+labels[li],icon:icons[li],short:'근력'+labels[li],exercises:exercises};
}
var CARDIO_OPTIONS=[
{name:'런닝',icon:'🏃‍♂️',dur:'20-30분',desc:'가볍게 달리기, 심폐 강화'},
{name:'빠르게 걷기',icon:'🚶‍♂️',dur:'30-40분',desc:'경사 걷기, 파워워킹'},
{name:'자전거',icon:'🚴‍♂️',dur:'20-30분',desc:'저강도 사이클링, 관절 부담 적음'},
{name:'줄넘기',icon:'🤸‍♂️',dur:'15-20분',desc:'고강도 전신 유산소'}
];
function generateCardio(idx){
var seed=idx*4219+17;
var rng=seededRand(seed);
var pick=CARDIO_OPTIONS[Math.floor(rng()*CARDIO_OPTIONS.length)];
return {type:'cardio',name:pick.name,icon:'🏃‍♂️',short:'유산소',dur:pick.dur,desc:pick.desc};
}

var CYCLE_PATTERN=['strength','cardio','strength','cardio','strength'];
function getRoutineForCycle(globalIdx){
var pos=globalIdx%5;
if(CYCLE_PATTERN[pos]==='cardio') return generateCardio(globalIdx);
else return generateRoutine(globalIdx);
}
var SWAP_MAX=3;

// === STATE ===
var S=JSON.parse(localStorage.getItem('wk_prince')||'{}');
if(S.idx===undefined)S.idx=0;
if(!S.sets)S.sets={};
if(!S.weights)S.weights=[];
if(!S.history)S.history=[];
if(!S.swaps)S.swaps={};
if(!S.swapped)S.swapped={};
if(!S.extras)S.extras=[];
if(!S.customPool)S.customPool=[];
// GAME stats
if(!S.str)S.str=0;
if(!S.sta)S.sta=0;
if(!S.spentStr)S.spentStr=0;
if(!S.spentSta)S.spentSta=0;
if(!S.shop)S.shop=[];
// Migrate old reward to shop
if(S.reward&&S.reward.img&&S.shop.length===0){
S.shop.push({id:Date.now(),name:S.reward.name||'보상',img:S.reward.img,price:S.reward.price||'',strCost:10,staCost:5,strInvested:0,staInvested:0,unlocked:false});
delete S.reward;
}
if(!S.reward)S.reward={};

var curTab=0;
var calYear,calMonth;
(function(){var d=new Date();calYear=d.getFullYear();calMonth=d.getMonth()})();
var calSelected=null;
function save(){localStorage.setItem('wk_prince',JSON.stringify(S))}
function toast(m){var t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(function(){t.classList.remove('show')},2400)}
function curRoutine(){return getRoutineForCycle(S.idx)}
function monthKey(y,m){return y+'-'+(m+1)}
function curMonthKey(){var d=new Date();return monthKey(d.getFullYear(),d.getMonth())}
function getSwapsUsed(){return S.swaps[curMonthKey()]||0}
function getLevel(){return Math.floor((S.str+S.sta)/5)+1}
function getAvailStr(){return S.str-S.spentStr}
function getAvailSta(){return S.sta-S.spentSta}
function getStreak(){
var days={};
S.history.forEach(function(h){days[h.year+'-'+h.month+'-'+h.day]=true});
var d=new Date();
var tk=d.getFullYear()+'-'+d.getMonth()+'-'+d.getDate();
if(!days[tk])d.setDate(d.getDate()-1);
var streak=0;
for(var i=0;i<365;i++){
var k=d.getFullYear()+'-'+d.getMonth()+'-'+d.getDate();
if(days[k]){streak++;d.setDate(d.getDate()-1);}else break;
}
return streak;
}

function switchTab(n){
curTab=n;
document.querySelectorAll('.tab').forEach(function(t,i){t.classList.toggle('active',i===n)});
render();
}

function render(){
if(curTab===0)renderWorkout();
else if(curTab===1)renderShop();
else if(curTab===2)renderCalendar();
else renderWeight();
}

// === STAT BAR (shared) ===
function renderStatBar(){
var h='<div class="stat-bar">';
h+='<div class="stat-item"><span class="stat-icon">⚔️</span><span class="stat-label">근력</span><div class="stat-val str">'+S.str+'</div><div class="stat-avail">사용 가능: '+getAvailStr()+'</div></div>';
h+='<div class="stat-item"><span class="stat-icon">🛡️</span><span class="stat-label">체력</span><div class="stat-val sta">'+S.sta+'</div><div class="stat-avail">사용 가능: '+getAvailSta()+'</div></div>';
h+='<div class="stat-item"><span class="stat-icon">🔥</span><span class="stat-label">연속</span><div class="stat-val" style="color:var(--gold)">'+getStreak()+'</div><div class="stat-avail">일 연속 수련</div></div>';
h+='</div>';
return h;
}

// === WORKOUT TAB ===
function renderWorkout(){
var r=curRoutine();
var h='<div class="header"><h1>⚔️ 왕자 수련</h1>';
h+='<div class="routine-label">'+(r.type==='cardio'?'🏃‍♂️ 유산소 Day — 체력 획득':r.icon+' '+r.name+' — 근력 획득')+'</div>';
h+='</div>';
h+=renderStatBar();
// Cycle guide
h+='<div class="cycle-bar">';
var ci=S.idx%5;
for(var gi=0;gi<5;gi++){
var rt=getRoutineForCycle(S.idx-ci+gi);
var cls=gi===ci?'now':(gi<ci?'done-step':'');
h+='<div class="cycle-step '+cls+'"><span class="step-icon">'+rt.icon+'</span>'+rt.short+'</div>';
}
h+='</div>';
// Weight
var latestW=S.weights.length?S.weights[S.weights.length-1]:null;
h+='<div class="weight-row">';
h+='<div class="wv">'+(latestW?latestW.kg+'<span> kg</span>':'<span style="font-size:13px">몸무게</span>')+'</div>';
h+='<input type="number" id="wi" placeholder="kg" step="0.1">';
h+='<button onclick="saveW()">저장</button>';
h+='</div>';

// Shop items preview in workout tab
if(S.shop.length>0){
h+='<div style="margin:8px 0">';
S.shop.forEach(function(item,i){
var strDone=item.strInvested>=item.strCost;
var staDone=item.staInvested>=item.staCost;
var unlocked=strDone&&staDone;
var strPct=Math.min(100,Math.round(item.strInvested/Math.max(1,item.strCost)*100));
var staPct=Math.min(100,Math.round(item.staInvested/Math.max(1,item.staCost)*100));
h+='<div class="shop-item'+(unlocked?' unlocked':'')+'" style="margin-bottom:8px">';
h+='<div class="shop-item-top">';
h+='<img class="shop-item-img'+(unlocked?'':' locked')+'" src="'+item.img+'" draggable="false">';
h+='<div class="shop-item-info">';
h+='<div class="shop-item-name" style="font-size:14px">'+(unlocked?'✨ ':'')+item.name+'</div>';
if(item.price) h+='<div class="shop-item-price">💰 '+item.price+'</div>';
h+='<div class="shop-item-cost">';
h+='<span class="cost-str">⚔️ '+item.strInvested+'/'+item.strCost+'</span>';
h+='<span class="cost-sta">🛡️ '+item.staInvested+'/'+item.staCost+'</span>';
h+='</div>';
h+='</div></div>';
if(unlocked){
h+='<div style="text-align:center;margin-top:6px"><span class="shop-unlocked-badge">🔓 해금 완료!</span></div>';
} else {

function investPoint(idx,type){
var item=S.shop[idx];
if(type==='str'){
if(getAvailStr()<=0||item.strInvested>=item.strCost)return;
item.strInvested++;S.spentStr++;
} else {
if(getAvailSta()<=0||item.staInvested>=item.staCost)return;
item.staInvested++;S.spentSta++;
}
save();
// Check unlock
var strDone=item.strInvested>=item.strCost;
var staDone=item.staInvested>=item.staCost;
if(strDone&&staDone&&!item.unlocked){
item.unlocked=true;save();
showConfetti();showConfetti(true);
toast('🎉 '+item.name+' 해금 완료!');
}
render();
}

function saveEditItem(idx){
var item=S.shop[idx];
item.name=document.getElementById('editName').value.trim()||item.name;
item.price=document.getElementById('editPrice').value.trim();
if(!item.unlocked){
var newStr=parseInt(document.getElementById('editStrCost').value);
var newSta=parseInt(document.getElementById('editStaCost').value);
if(!isNaN(newStr)){
// Refund excess invested
if(newStr<item.strInvested){S.spentStr-=(item.strInvested-newStr);item.strInvested=newStr;}
item.strCost=newStr;
}
if(!isNaN(newSta)){
if(newSta<item.staInvested){S.spentSta-=(item.staInvested-newSta);item.staInvested=newSta;}
item.staCost=newSta;
}
}
save();closeModal();render();toast('수정 완료!');
}
function deleteShopItem(idx){
if(!confirm('정말 삭제할까요?'))return;
var item=S.shop[idx];
// Refund invested points
S.spentStr-=item.strInvested;
S.spentSta-=item.staInvested;
S.shop.splice(idx,1);
save();closeModal();render();toast('삭제 완료!');
}

function drawChart(){
var canvas=document.getElementById('wtCanvas');
if(!canvas)return;
var ctx=canvas.getContext('2d');
var dpr=window.devicePixelRatio||1;
canvas.width=canvas.offsetWidth*dpr;canvas.height=200*dpr;
ctx.scale(dpr,dpr);
var W=canvas.offsetWidth,H=200;
var data=S.weights.slice(-20);
var vals=data.map(function(w){return w.kg});
var minV=Math.min.apply(null,vals);var maxV=Math.max.apply(null,vals);
var min=Math.floor(minV)-1;var max=Math.ceil(maxV)+1;
var range=max-min||1;
var padL=40,padR=10,padT=15,padB=25;
var gw=W-padL-padR,gh=H-padT-padB;
ctx.strokeStyle='rgba(75,123,236,0.08)';ctx.lineWidth=1;
for(var v=min;v<=max;v++){
var y=padT+(max-v)/range*gh;
ctx.beginPath();ctx.moveTo(padL,y);ctx.lineTo(W-padR,y);ctx.stroke();
ctx.fillStyle='#506080';ctx.font='10px sans-serif';ctx.textAlign='right';
ctx.fillText(v,padL-4,y+3);
}
ctx.beginPath();ctx.strokeStyle='#4B7BEC';ctx.lineWidth=2.5;ctx.lineJoin='round';
data.forEach(function(w,i){
var x=padL+i/(data.length-1)*gw;
var y=padT+(max-w.kg)/range*gh;
if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);
});
ctx.stroke();
data.forEach(function(w,i){
var x=padL+i/(data.length-1)*gw;
var y=padT+(max-w.kg)/range*gh;
ctx.beginPath();ctx.arc(x,y,4,0,Math.PI*2);ctx.fillStyle='#4B7BEC';ctx.fill();
ctx.beginPath();ctx.arc(x,y,2,0,Math.PI*2);ctx.fillStyle='#fff';ctx.fill();
});
ctx.fillStyle='#506080';ctx.font='9px sans-serif';ctx.textAlign='center';
[0,Math.floor(data.length/2),data.length-1].forEach(function(i){
if(!data[i])return;
var x=padL+i/(data.length-1)*gw;
ctx.fillText(data[i].date.split('.').slice(1).join('/'),x,H-5);
});
}

var sx,sy,sl,st;
function onStart(e){e.preventDefault();var p=e.touches?e.touches[0]:e;sx=p.clientX;sy=p.clientY;sl=parseFloat(img.style.left)||0;st=parseFloat(img.style.top)||0;}
function onMove(e){if(sx===undefined)return;e.preventDefault();var p=e.touches?e.touches[0]:e;img.style.left=(sl+p.clientX-sx)+'px';img.style.top=(st+p.clientY-sy)+'px';}
function onEnd(){sx=undefined}
area.addEventListener('touchstart',onStart,{passive:false});
area.addEventListener('touchmove',onMove,{passive:false});
area.addEventListener('touchend',onEnd);
area.addEventListener('mousedown',onStart);
area.addEventListener('mousemove',onMove);
area.addEventListener('mouseup',onEnd);
};
