<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#E8DCC8">
<title>용사 길드</title>
<link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">
<style>
:root{--bg:#F5EFE0;--sf:#FFF8EC;--sf2:#F0E8D8;--tx:#2C1810;--tm:#7A6650;--th:#A89880;--gold:#D4A017;--gold2:#B8860B;--blue:#4A6FA5;--blue2:#3A5A8A;--green:#5B9A3A;--red:#C0392B;--pix:#6B5B4B;--card:#FFFBF2;--border:#8B7B60;--shadow:3px 3px 0 rgba(44,24,16,.18)}
@media(prefers-color-scheme:dark){:root{--bg:#1C1814;--sf:#2A2420;--sf2:#342C24;--tx:#E8DCC8;--tm:#A89880;--th:#7A6650;--card:#2A2420;--border:#4A3C30}}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;image-rendering:pixelated}
html,body{height:100%;overscroll-behavior:none}
body{font-family:'DotGothic16',monospace;background:var(--bg);color:var(--tx);background-image:url("data:image/svg+xml,%3Csvg width='8' height='8' xmlns='http://www.w3.org/2000/svg'%3E%3Crect width='8' height='8' fill='none'/%3E%3Crect x='0' y='0' width='2' height='2' fill='rgba(107,91,75,.04)'/%3E%3Crect x='4' y='4' width='2' height='2' fill='rgba(107,91,75,.04)'/%3E%3C/svg%3E")}
#app{max-width:480px;margin:0 auto;min-height:100dvh;padding:env(safe-area-inset-top) 14px 80px;overflow-y:auto;-webkit-overflow-scrolling:touch}

@keyframes floaty{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
@keyframes bounceIn{0%{transform:scale(.3);opacity:0}50%{transform:scale(1.05)}70%{transform:scale(.95)}100%{transform:scale(1);opacity:1}}
@keyframes jelly{0%,100%{transform:scale(1)}25%{transform:scale(.95,1.05)}50%{transform:scale(1.05,.95)}75%{transform:scale(.98,1.02)}}
@keyframes coinSpin{0%{transform:rotateY(0)}100%{transform:rotateY(360deg)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes pixelBlink{0%,90%,100%{opacity:1}95%{opacity:.4}}
@keyframes pixelCursor{0%,100%{border-color:var(--gold)}50%{border-color:transparent}}

/* === PIXEL BORDER UTIL === */
.pix-border{border:3px solid var(--pix);box-shadow:var(--shadow),inset -1px -1px 0 rgba(0,0,0,.1),inset 1px 1px 0 rgba(255,255,255,.2);border-radius:0}
.pix-card{background:var(--card);border:3px solid var(--border);box-shadow:var(--shadow),inset -1px -1px 0 rgba(0,0,0,.08),inset 1px 1px 0 rgba(255,255,255,.3);border-radius:0}

/* === TABS === */
.tabs{position:fixed;bottom:0;left:0;right:0;background:var(--sf2);border-top:4px solid var(--border);display:flex;justify-content:center;z-index:100;padding:4px 0 env(safe-area-inset-bottom)}
.tabs-inner{display:flex;max-width:480px;width:100%}
.tab{flex:1;padding:8px 0;text-align:center;font-size:11px;color:var(--th);border:none;background:none;cursor:pointer;font-family:inherit;transition:all .15s;font-weight:400;letter-spacing:1px}
.tab-icon{font-size:20px;display:block;margin-bottom:2px}
.tab.active{color:var(--gold2);font-weight:400;background:rgba(212,160,23,.12);border-top:3px solid var(--gold)}
.tab.active .tab-icon{animation:jelly .4s ease}

/* === GP BAR === */
.gp-bar{display:flex;flex-wrap:wrap;align-items:center;justify-content:center;gap:6px;margin:6px 0;padding:6px 12px;background:var(--sf);border:2px solid var(--border);border-radius:0;box-shadow:var(--shadow)}
.gp-coin{font-size:18px;animation:floaty 2s ease-in-out infinite}
.gp-info{text-align:left}
.gp-label{font-size:9px;color:var(--gold2);font-weight:400;letter-spacing:2px}
.gp-val{font-size:18px;font-weight:400;color:var(--gold2);text-shadow:1px 1px 0 rgba(0,0,0,.1);font-family:'DotGothic16',monospace}
.gp-avail{font-size:9px;color:var(--th);margin-top:-2px}
.gp-streak{text-align:center;padding:2px 6px;background:var(--sf2);border-radius:0;border:2px solid var(--border)}
.gp-streak-num{font-size:13px;font-weight:400;color:#FF8C42;font-family:'DotGothic16',monospace}
.gp-streak-label{font-size:8px;color:var(--th)}

/* === HEADER === */
.header{padding:14px 0 4px;text-align:center}
.header h1{font-size:22px;font-weight:900;color:#2C1810;letter-spacing:4px;font-family:'DotGothic16',monospace;text-shadow:1px 1px 0 rgba(0,0,0,.1)}
.header-sub{font-size:13px;font-weight:400;color:var(--tm);margin-top:4px;letter-spacing:1px}
.quest-type{display:inline-block;padding:3px 10px;border-radius:0;font-size:11px;font-weight:400;margin-top:4px;margin-bottom:0;letter-spacing:1px}
.quest-type.str{background:rgba(200,60,40,.12);color:#C04030;border:3px solid rgba(200,60,40,.3)}
.quest-type.sta{background:rgba(60,140,80,.12);color:#3A8A3A;border:3px solid rgba(60,140,80,.3)}

/* === GUILD BOARD === */
.guild-board{position:relative;margin:10px -25%;width:150%;aspect-ratio:1.83/1;background:var(--bg) url('board.png') center/contain no-repeat;image-rendering:auto}
.board-slots{position:absolute;top:22%;left:24%;right:24%;bottom:16%;display:flex;flex-direction:column;justify-content:center;gap:0;overflow:hidden}
.board-slot{display:flex;align-items:center;justify-content:center;gap:4px;padding:4px 6px;font-size:14px;color:#D4C4A0;line-height:1.3;cursor:default;transition:all .2s;border-radius:0;font-family:'DotGothic16',monospace;text-align:center;text-shadow:1px 1px 2px rgba(0,0,0,.6)}
.board-slot .step-icon{font-size:14px;flex-shrink:0}
.board-slot .step-label{flex:1;letter-spacing:.5px}
.board-slot .step-gp{font-size:10px;color:#5A4A30;white-space:nowrap}
.board-slot.now{background:rgba(212,160,23,.3);border:2px solid var(--gold);box-shadow:0 0 10px rgba(212,160,23,.5);color:#FFE4A0;font-weight:bold;text-shadow:1px 1px 3px rgba(0,0,0,.7)}
.board-slot.now .step-gp{color:var(--gold2)}
.board-slot.done-step{color:#8B9A6B;opacity:.55;text-shadow:1px 1px 2px rgba(0,0,0,.4)}

/* === WEIGHT === */
.weight-row{display:flex;align-items:center;gap:8px;padding:6px 12px;margin:2px 0}
.weight-row .wv{font-size:16px;font-weight:400;flex:1;color:var(--blue)}
.weight-row .wv span{font-size:11px;color:var(--th);font-weight:400}
.weight-row input{width:60px;border:3px solid var(--border);border-radius:0;padding:6px;font-size:13px;text-align:center;background:var(--card);color:var(--tx);font-family:inherit}
.weight-row input:focus{border-color:var(--gold);outline:none}
.weight-row button{background:var(--blue);color:#fff;border:3px solid var(--blue2);border-radius:0;padding:6px 12px;font-size:12px;font-weight:400;font-family:inherit;cursor:pointer;box-shadow:var(--shadow)}
.weight-row button:active{transform:translateY(2px);box-shadow:none}

/* === QUEST BOARD (exercises) === */
.quest-board{margin:4px 0}
.quest-board-title{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--tm);font-weight:400;margin-bottom:6px;padding:0 2px;letter-spacing:1px}
.ex-list{display:flex;flex-direction:column;gap:8px}
.ex-card{background:var(--card);border:3px solid var(--border);border-radius:0;padding:12px;box-shadow:var(--shadow);transition:all .2s}
.ex-card.done{opacity:.45;border-style:dashed}
.ex-card.done .ex-name{text-decoration:line-through}
.ex-name{font-size:14px;font-weight:400;margin-bottom:2px;letter-spacing:1px}
.ex-desc{font-size:11px;color:var(--tm);margin-bottom:8px;font-weight:400}
.ex-sets{display:flex;gap:6px;flex-wrap:wrap}
.set-btn{width:38px;height:38px;border-radius:0;border:3px solid var(--border);background:var(--sf);font-size:12px;font-weight:400;color:var(--tm);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;font-family:'DotGothic16',monospace;box-shadow:2px 2px 0 rgba(0,0,0,.1)}
.set-btn.done{background:var(--green);border-color:#4A8030;color:#fff;box-shadow:var(--shadow);animation:bounceIn .25s ease}
.set-btn:active{transform:scale(.85)}
.how-btn{font-size:11px;color:var(--blue);background:none;border:none;cursor:pointer;font-family:inherit;margin-top:6px;font-weight:400;letter-spacing:1px}
.how-text{font-size:11px;color:var(--tm);line-height:1.6;margin-top:4px;white-space:pre-line;display:none;background:var(--sf);padding:8px;border-radius:0;border:2px solid var(--border)}

/* === REST TIMER === */
.rest-timer{margin-top:6px;padding:6px 10px;background:var(--sf);border-radius:0;display:flex;align-items:center;gap:6px;border:2px solid var(--border);animation:bounceIn .25s ease}
.rest-timer-bar{flex:1;height:8px;background:var(--sf2);border-radius:0;overflow:hidden;border:2px solid var(--border)}
.rest-timer-fill{height:100%;border-radius:0;background:var(--blue);transition:width .3s steps(20)}
.rest-timer-text{font-size:11px;font-weight:400;color:var(--blue);min-width:32px;text-align:right;font-family:'DotGothic16',monospace}
.rest-timer.done-timer .rest-timer-fill{background:var(--green)}
.rest-timer.done-timer .rest-timer-text{color:var(--green);animation:jelly .5s ease}

/* === PROGRESS === */
.progress-bar{height:10px;background:var(--sf2);border:3px solid var(--border);border-radius:0;margin:4px 0 2px;overflow:hidden}
.progress-fill{height:100%;background:var(--blue);transition:width .3s steps(20);border-radius:0}
.progress-text{font-size:12px;color:var(--tm);text-align:center;margin-bottom:3px;font-weight:400;letter-spacing:1px}

/* === CARDIO === */
.walk-card{text-align:center;padding:28px 14px;margin:10px 0;border:3px solid var(--border);border-radius:0;background:var(--card);box-shadow:var(--shadow)}
.walk-card h2{font-size:18px;margin-bottom:6px;font-weight:400;letter-spacing:2px}
.walk-card p{font-size:12px;color:var(--tm);line-height:1.5;margin-bottom:12px}

/* === DONE CARD === */
.done-card{text-align:center;padding:24px 14px;margin:10px 0;animation:bounceIn .4s ease}
.done-card h2{font-size:22px;margin-bottom:6px;animation:jelly .6s ease;letter-spacing:2px}
.done-card p{font-size:12px;color:var(--tm);margin-bottom:14px}
.done-btns{display:flex;flex-direction:column;gap:6px}

/* === BUTTONS === */
.btn-primary{padding:12px;background:var(--blue);color:#fff;border:3px solid var(--blue2);border-radius:0;font-size:14px;font-weight:400;cursor:pointer;font-family:inherit;width:100%;box-shadow:var(--shadow);transition:all .1s;letter-spacing:1px}
.btn-primary:active{transform:translateY(3px);box-shadow:none}
.btn-ghost{padding:10px;background:var(--card);border:3px solid var(--border);border-radius:0;font-size:13px;color:var(--tx);cursor:pointer;font-family:inherit;width:100%;font-weight:400;box-shadow:var(--shadow);transition:all .1s}
.btn-ghost:active{transform:translateY(2px);box-shadow:none}
.btn-skip{padding:8px;background:var(--sf);border:3px dashed var(--border);border-radius:0;font-size:12px;color:var(--th);cursor:pointer;font-family:inherit;width:100%;transition:all .1s}
.btn-skip:active{transform:translateY(2px)}
.btn-gold{padding:12px;background:#E8B820;color:#2C1810;border:3px solid var(--gold2);border-radius:0;font-size:14px;font-weight:400;cursor:pointer;font-family:inherit;width:100%;box-shadow:var(--shadow);transition:all .1s;letter-spacing:1px}
.btn-gold:active{transform:translateY(3px);box-shadow:none}
.btn-gold:disabled{opacity:.4;cursor:not-allowed}

/* === SHOP ITEMS === */
.shop-section{margin:12px 0}
.shop-section-title{font-size:14px;font-weight:400;color:var(--gold2);margin-bottom:8px;display:flex;align-items:center;gap:6px;font-family:'DotGothic16',monospace;letter-spacing:2px}
.shop-item{background:var(--card);border:3px solid var(--border);border-radius:0;padding:12px;margin-bottom:8px;box-shadow:var(--shadow);position:relative;overflow:hidden}
.shop-item.unlocked{border-color:var(--gold);background:#FFFDF4}
@media(prefers-color-scheme:dark){.shop-item.unlocked{background:#2E2818}}
.shop-item-top{display:flex;gap:10px;align-items:center}
.shop-item-img{width:72px;height:72px;border-radius:0;object-fit:cover;border:3px solid var(--border);flex-shrink:0;image-rendering:pixelated}
.shop-item-img.locked{filter:none}
.shop-item.unlocked .shop-item-img{border-color:var(--gold);filter:none}
.shop-item-info{flex:1;min-width:0}
.shop-item-name{font-size:14px;font-weight:400;letter-spacing:1px}
.shop-item-price{font-size:11px;color:var(--tm)}
.shop-item-cost{display:inline-block;margin-top:4px;padding:2px 8px;background:rgba(212,160,23,.12);border:2px solid rgba(212,160,23,.35);border-radius:0;font-size:11px;font-weight:400;color:var(--gold2)}
.shop-prog{margin-top:8px}
.shop-prog-bar{height:10px;background:var(--sf2);border:3px solid var(--border);border-radius:0;overflow:hidden}
.shop-prog-fill{height:100%;background:var(--gold);border-radius:0;transition:width .3s steps(20)}
.shop-prog-info{display:flex;justify-content:space-between;margin-top:4px;font-size:10px;color:var(--th);font-weight:400}
.shop-exchange-btn{margin-top:8px;padding:8px;background:#E8B820;color:#2C1810;border:3px solid var(--gold2);border-radius:0;font-size:12px;font-weight:400;cursor:pointer;font-family:inherit;width:100%;box-shadow:var(--shadow);letter-spacing:1px}
.shop-exchange-btn:active{transform:translateY(2px);box-shadow:none}
.shop-exchange-btn:disabled{opacity:.35;cursor:not-allowed}
.shop-unlocked-badge{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;background:var(--gold);color:#2C1810;border-radius:0;font-size:11px;font-weight:400;margin-top:6px;border:2px solid var(--gold2);box-shadow:var(--shadow)}
.shop-add-btn{margin-top:8px;padding:12px;background:var(--sf);border:3px dashed var(--border);border-radius:0;text-align:center;cursor:pointer;font-family:inherit;color:var(--tm);font-size:13px;font-weight:400;box-shadow:var(--shadow);width:100%}
.shop-add-btn:active{transform:translateY(2px);box-shadow:none}

/* === MINI SHOP PREVIEW (in workout tab) === */
.mini-shop{margin:8px 0}
.mini-item{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--card);border:3px solid var(--border);border-radius:0;margin-bottom:6px;box-shadow:var(--shadow)}
.mini-item.unlocked{border-color:var(--gold)}
.mini-item-img{width:60px;height:60px;border-radius:0;object-fit:cover;border:2px solid var(--border);image-rendering:pixelated}
.mini-item-img.locked{filter:none}
.mini-item.unlocked .mini-item-img{border-color:var(--gold);filter:none}
.mini-item-info{flex:1;min-width:0}
.mini-item-name{font-size:12px;font-weight:400;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mini-prog{height:6px;background:var(--sf2);border-radius:0;overflow:hidden;margin-top:3px;border:2px solid var(--border)}
.mini-prog-fill{height:100%;background:var(--gold);border-radius:0}
.mini-item-gp{font-size:10px;color:var(--gold2);font-weight:400;font-family:'DotGothic16',monospace;white-space:nowrap}

/* === CALENDAR === */
.cal-month{text-align:center;font-size:16px;font-weight:400;margin:14px 0 10px;display:flex;align-items:center;justify-content:center;gap:12px;color:var(--tx);letter-spacing:2px}
.cal-nav{background:var(--card);border:3px solid var(--border);font-size:14px;cursor:pointer;color:var(--tx);padding:4px 10px;border-radius:0;box-shadow:var(--shadow)}
.cal-nav:active{transform:translateY(2px);box-shadow:none}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:12px}
.cal-day-header{text-align:center;font-size:10px;color:var(--th);padding:4px 0;font-weight:400}
.cal-day{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:0;font-size:11px;color:var(--tm);cursor:pointer;transition:all .15s;position:relative;font-weight:400}
.cal-day:active{transform:scale(.85)}
.cal-day.today{font-weight:400;color:var(--tx);border:3px solid var(--blue)}
.cal-day.has-record{background:rgba(212,160,23,.15);color:var(--gold2);font-weight:400}
.cal-day.has-record::after{content:'■';font-size:6px;color:var(--gold);position:absolute;bottom:1px}
.cal-day.selected{background:var(--gold);color:#2C1810;font-weight:400;box-shadow:var(--shadow)}
.cal-day.selected::after{color:#2C1810}
.cal-detail{border:3px solid var(--border);border-radius:0;padding:12px;margin:6px 0;background:var(--card);box-shadow:var(--shadow);animation:bounceIn .25s ease}
.cal-detail-title{font-size:12px;font-weight:400;margin-bottom:6px;color:var(--gold2);letter-spacing:1px}
.cal-detail-item{font-size:11px;color:var(--tm);padding:3px 0}

/* === WEIGHT / RECORDS === */
.wt-current{text-align:center;padding:18px 0}
.wt-current .wt-num{font-size:40px;font-weight:400;color:var(--blue);font-family:'DotGothic16',monospace;text-shadow:2px 2px 0 rgba(0,0,0,.1)}
.wt-current .wt-unit{font-size:12px;color:var(--tm)}
.wt-input-row{display:flex;gap:8px;margin:0 0 12px;align-items:center}
.wt-input-row input{flex:1;border:3px solid var(--border);border-radius:0;padding:10px;font-size:14px;text-align:center;background:var(--card);color:var(--tx);font-family:inherit}
.wt-input-row input:focus{border-color:var(--gold);outline:none}
.wt-input-row button{background:var(--blue);color:#fff;border:3px solid var(--blue2);border-radius:0;padding:10px 18px;font-size:13px;font-weight:400;font-family:inherit;cursor:pointer;box-shadow:var(--shadow)}
.wt-chart{background:var(--card);border:3px solid var(--border);border-radius:0;padding:12px;margin:10px 0;box-shadow:var(--shadow)}
.wt-chart canvas{width:100%;height:200px}
.wt-list{margin:10px 0}
.wt-item{display:flex;justify-content:space-between;padding:8px 0;border-bottom:2px solid var(--sf2);font-size:12px}
.wt-item .wt-d{color:var(--th)}

/* === MODALS === */
.modal-bg{position:fixed;inset:0;background:rgba(20,16,10,.75);z-index:200;display:flex;align-items:center;justify-content:center;padding:18px}
.modal-box{background:var(--card);border:4px solid var(--border);border-radius:0;padding:22px;max-width:340px;width:100%;text-align:center;box-shadow:6px 6px 0 rgba(0,0,0,.2);animation:bounceIn .3s ease}
.modal-box h3{font-size:17px;margin-bottom:8px;font-weight:400;color:var(--gold2);font-family:'DotGothic16',monospace;letter-spacing:2px}
.modal-box p{font-size:12px;color:var(--tm);margin-bottom:12px;line-height:1.6}
.modal-btns{display:flex;gap:6px}
.modal-btns button{flex:1;padding:10px;border-radius:0;font-size:13px;font-weight:400;border:3px solid var(--border);cursor:pointer;font-family:inherit;box-shadow:var(--shadow)}
.modal-btns button:active{transform:translateY(2px);box-shadow:none}

/* === COMPLETE POPUP === */
.complete-popup{position:fixed;inset:0;background:rgba(20,16,10,.8);z-index:200;display:flex;align-items:center;justify-content:center;padding:18px}
.complete-box{background:var(--card);border:4px solid var(--gold);border-radius:0;padding:22px;max-width:340px;width:100%;text-align:center;box-shadow:6px 6px 0 rgba(0,0,0,.2);animation:bounceIn .35s ease}
.gp-gain{font-size:28px;font-weight:400;color:var(--gold2);margin:10px 0;font-family:'DotGothic16',monospace;animation:jelly .5s ease;text-shadow:2px 2px 0 rgba(0,0,0,.15)}
.gp-gain-sub{font-size:12px;color:var(--tm);margin-bottom:8px}
.complete-comment{font-size:11px;color:var(--tm);margin:8px 0;padding:8px;background:var(--sf);border-radius:0;border:2px solid var(--border);line-height:1.5;text-align:left}

/* === CROP === */
.crop-modal{position:fixed;inset:0;background:rgba(20,16,10,.95);z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center}
.crop-title{color:#E8DCC8;font-size:13px;margin-bottom:10px;font-weight:400;letter-spacing:2px}
.crop-area{width:180px;height:180px;overflow:hidden;border-radius:0;border:4px solid var(--gold);position:relative;touch-action:none;cursor:grab}
.crop-area img{position:absolute;max-width:none;max-height:none;user-select:none;-webkit-user-drag:none}
.crop-btns{display:flex;gap:10px;margin-top:14px}
.crop-btns button{padding:10px 22px;border-radius:0;font-size:13px;font-weight:400;border:3px solid var(--border);cursor:pointer;font-family:inherit;box-shadow:var(--shadow)}
.crop-save{background:var(--gold);color:#2C1810;border-color:var(--gold2)!important}
.crop-cancel{background:rgba(255,255,255,.1);color:#E8DCC8}

/* === MISC === */

<script>

// === EXERCISE POOL ===
var POOL={
compound:[

{name:'고블릿 스쿼트',sets:3,reps:10,how:'덤벨/물병 가슴 앞에 잡기\n스쿼트 자세로 앉기\n팔꿈치가 무릎 안쪽에 닿을 정도\n발뒤꿈치로 밀며 올라오기'},
{name:'런지',sets:3,reps:10,how:'한 발 앞으로 크게 내딛기\n뒷무릎 바닥 가까이 내려가기\n상체 곧게, 앞무릎 90도\n앞발 뒤꿈치로 밀며 원위치'},
{name:'와이드 스쿼트',sets:3,reps:10,how:'발을 어깨보다 넓게, 발끝 45도 바깥\n엉덩이 뒤로 빼며 깊게 앉기\n내전근(허벅지 안쪽) 자극 느끼기\n발뒤꿈치로 밀며 올라오기'},
{name:'스플릿 스쿼트',sets:3,reps:10,how:'한 발 앞, 한 발 뒤로 벌리고 서기\n뒷무릎 바닥 가까이 내리기\n상체 곧게 유지\n앞발로 밀며 올라오기, 양쪽 번갈아'}
],
hinge:[
{name:'루마니안 데드리프트',sets:3,reps:10,how:'발 골반너비, 무릎 살짝 굽힘 유지\n엉덩이를 뒤로 밀며 상체 숙이기\n햄스트링 당김 느끼면 멈추기\n둔근 쥐어짜며 올라오기'},
{name:'덤벨 데드리프트',sets:3,reps:10,how:'양손 덤벨, 발 골반너비\n엉덩이 뒤로 밀며 숙이기\n덤벨이 정강이 따라 내려가게\n둔근·햄스트링으로 올라오기'},
{name:'힙쓰러스트',sets:3,reps:12,how:'등 상부를 의자/소파에 기대기\n발바닥 바닥, 무릎 90도\n둔근 힘주며 골반 들어올리기\n정점 2초 유지'},
{name:'글루트브릿지',sets:3,reps:12,how:'누워서 무릎 굽히고 발바닥 바닥에\n둔근 힘주며 골반 들어올리기\n어깨~무릎 일직선, 2초 유지\n천천히 내리기'},
{name:'싱글레그 데드리프트',sets:3,reps:10,how:'한 발로 서기, 반대 다리 뒤로 뻗기\n엉덩이 뒤로 밀며 상체 숙이기\n균형 잡으며 햄스트링 당김 느끼기\n천천히 올라오기, 양쪽 번갈아'}
],
pull:[
{name:'덤벨 로우',sets:3,reps:10,how:'한 손+한 무릎 벤치에 짚기\n반대 손으로 덤벨/밴드 당기기\n팔꿈치를 골반 쪽으로 당기듯\n천천히 내리기'},
{name:'밴드 로우',sets:3,reps:10,how:'밴드를 문에 걸거나 높은 곳에 고정\n양손으로 당기기\n견갑골 모으듯 등 수축\n천천히 돌아가기'},
{name:'밴드 풀어파트',sets:3,reps:12,how:'밴드를 양손으로 어깨너비 잡기\n팔 펴고 가슴 높이에서 시작\n양쪽으로 당겨 벌리기\n견갑골 모으며 2초 유지'},
{name:'슈퍼맨',sets:3,reps:10,how:'엎드려서 팔다리 쭉 펴기\n동시에 팔·다리·가슴 들어올리기\n2초 유지 후 천천히 내리기\n허리 과하게 꺾지 않기'}
],
push:[
{name:'인클라인 푸시업',sets:3,reps:10,how:'의자나 벽에 손 짚고 푸시업\n몸 일직선 유지\n가슴이 손 높이 가까이 올 때까지\n밀어 올리기'},
{name:'푸시업',sets:3,reps:10,how:'손 어깨너비, 몸 일직선\n가슴이 바닥 가까이 올 때까지\n코어 힘주고 밀어 올리기\n어려우면 무릎 대고'},
{name:'숄더프레스',sets:3,reps:10,how:'양손 덤벨/밴드 어깨 높이\n머리 위로 밀어올리기\n팔꿈치 완전히 펴기\n천천히 내리기'},

{name:'플랭크',sets:2,reps:'30초',how:'팔꿈치 바닥, 어깨 바로 아래\n머리~발끝 일직선 유지\n배꼽 척추 쪽으로 당기듯\n엉덩이 올라가거나 처지지 않게'},
{name:'팔로프 프레스',sets:2,reps:10,how:'밴드를 옆에 고정, 양손으로 잡기\n가슴 앞에서 팔 쭉 뻗기\n몸이 돌아가지 않게 코어 버티기\n천천히 당겨오기. 양쪽 반복'},
{name:'바이시클 크런치',sets:2,reps:12,how:'누워서 머리 살짝 들기\n오른 팔꿈치-왼 무릎 터치\n반대쪽 다리는 쭉 뻗기\n교대로 자전거 페달 돌리듯'},
{name:'사이드 플랭크',sets:2,reps:'20초',how:'옆으로 누워 팔꿈치 짚기\n골반 들어올려 몸 일직선\n위쪽 손 허리 또는 하늘\n양쪽 각각 수행'}
]
};
function seededRand(seed){return function(){seed=(seed*16807+0)%2147483647;return(seed-1)/2147483646}}
function pickRandom(arr,n,rng){var a=arr.slice();var res=[];for(var i=0;i<n&&a.length;i++){var idx=Math.floor(rng()*a.length);res.push(a.splice(idx,1)[0])}return res}
function generateRoutine(idx){
var seed=idx*7919+31;var rng=seededRand(seed);
var labels=['A','B','C'];var icons=['⚔️','🛡️','🗡️'];var posInCycle=idx%5;var strMap={0:0,2:1,4:2};var li=strMap[posInCycle]!==undefined?strMap[posInCycle]:0;
var base=[pickRandom(POOL.compound,1,rng)[0],pickRandom(POOL.hinge,1,rng)[0],pickRandom(rng()<0.5?POOL.pull:POOL.push,1,rng)[0],pickRandom(POOL.core,1,rng)[0]];
var exercises=base.map(function(ex,i){var key=idx+'_'+i;var e=S.swapped&&S.swapped[key]?S.swapped[key]:ex;
var c=S.config||{sets:3,reps:10,coreSets:2,coreReps:10};
var isCore=i===3;
return {name:e.name,sets:isCore?c.coreSets:c.sets,reps:isCore?(typeof e.reps==='string'?e.reps:c.coreReps):(typeof e.reps==='string'?e.reps:c.reps),how:e.how};});
return {type:'strength',name:'근력 퀘스트 '+labels[li],icon:icons[li],short:'근력'+labels[li],exercises:exercises};
}
var CARDIO_OPTIONS=[
{name:'런닝',icon:'🏃‍♂️',dur:'20-30분',desc:'가볍게 달리기, 심폐 강화'},
{name:'빠르게 걷기',icon:'🚶‍♂️',dur:'30-40분',desc:'파워워킹, 지구력 강화'},
{name:'자전거',icon:'🚴‍♂️',dur:'20-30분',desc:'저강도 사이클링'},
{name:'줄넘기',icon:'🤸‍♂️',dur:'15-20분',desc:'고강도 전신 유산소'}
];
function getAllCardio(){
var durs=(S.config&&S.config.cardioDurs)||{};
var list=CARDIO_OPTIONS.map(function(c){return {name:c.name,icon:c.icon,dur:durs[c.name]?durs[c.name]+'분':c.dur,desc:c.desc}});
(S.customCardio||[]).forEach(function(c){list.push({name:c.name,icon:c.icon||'🏃',dur:durs[c.name]?durs[c.name]+'분':(c.dur||'25분'),desc:c.desc||'커스텀 유산소'})});
return list;
}
function generateCardio(idx){
var seed=idx*4219+17;var rng=seededRand(seed);
var pick=CARDIO_OPTIONS[Math.floor(rng()*CARDIO_OPTIONS.length)];
return {type:'cardio',name:'유산소 퀘스트',icon:'🏃‍♂️',short:'유산소',dur:pick.dur,desc:pick.desc,cardioName:pick.name};
}
var CYCLE_PATTERN=['strength','cardio','strength','cardio','strength'];
function getRoutineForCycle(gi){var pos=gi%5;return CYCLE_PATTERN[pos]==='cardio'?generateCardio(gi):generateRoutine(gi)}
var SWAP_MAX=3;

// === STATE ===
var S=JSON.parse(localStorage.getItem('wk_prince')||'{}');
if(S.idx===undefined)S.idx=0;
if(!S.sets)S.sets={};
if(!S.weights)S.weights=[];
if(!S.history)S.history=[];
if(!S.swaps)S.swaps={};
if(!S.swapped)S.swapped={};
if(!S.extras)S.extras=[];
if(!S.customPool)S.customPool=[];
if(!S.gp)S.gp=0;
if(!S.spentGp)S.spentGp=0;
if(!S.shop)S.shop=[];
if(!S.archivedShop)S.archivedShop=[];
if(!S.config)S.config={sets:3,reps:10,coreSets:2,coreReps:10,cardioDur:25};
if(!S.customCardio)S.customCardio=[];
if(S.strChoice===undefined)S.strChoice=null;
// Migrate old str/sta to gp
if(S.str||S.sta){S.gp=(S.str||0)*GP_STR+(S.sta||0)*GP_STA;delete S.str;delete S.sta;S.spentGp=(S.spentStr||0)*GP_STR+(S.spentSta||0)*GP_STA;delete S.spentStr;delete S.spentSta;}
// Migrate old shop items
S.shop.forEach(function(item){
if(item.strCost!==undefined&&item.gpCost===undefined){
item.gpCost=item.strCost*GP_STR+item.staCost*GP_STA;
item.gpInvested=(item.strInvested||0)*GP_STR+(item.staInvested||0)*GP_STA;
delete item.strCost;delete item.staCost;delete item.strInvested;delete item.staInvested;
}
});
if(S.reward&&S.reward.img&&S.shop.length===0){
S.shop.push({id:Date.now(),name:S.reward.name||'보상',img:S.reward.img,price:S.reward.price||'',gpCost:200,gpInvested:0,unlocked:false});
delete S.reward;
}
if(!S.reward)S.reward={};

var curTab=0;
var calYear,calMonth;
(function(){var d=new Date();calYear=d.getFullYear();calMonth=d.getMonth()})();
var calSelected=null;
function save(){localStorage.setItem('wk_prince',JSON.stringify(S))}
function toast(m){var t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(function(){t.classList.remove('show')},2400)}
function curRoutine(){return getRoutineForCycle(S.idx)}
function curMonthKey(){var d=new Date();return d.getFullYear()+'-'+(d.getMonth()+1)}
function getSwapsUsed(){return S.swaps[curMonthKey()]||0}
function getAvailGp(){return S.gp-S.spentGp}
function getStreak(){
var days={};S.history.forEach(function(h){days[h.year+'-'+h.month+'-'+h.day]=true});
var d=new Date();var tk=d.getFullYear()+'-'+d.getMonth()+'-'+d.getDate();
if(!days[tk])d.setDate(d.getDate()-1);
var s=0;for(var i=0;i<365;i++){if(days[d.getFullYear()+'-'+d.getMonth()+'-'+d.getDate()]){s++;d.setDate(d.getDate()-1);}else break;}
return s;
}

function switchTab(n){curTab=n;document.querySelectorAll('.tab').forEach(function(t,i){t.classList.toggle('active',i===n)});render()}
function render(){
if(curTab===0)renderWorkout();
else if(curTab===1)renderShop();
else if(curTab===2)renderCalendar();
else renderWeight();
}

// === GP BAR ===
function renderGpBar(){
var h='<div class="gp-bar">';
h+='<div class="gp-coin">💰</div>';
h+='<div class="gp-info"><div class="gp-label">GUILD POINT</div>';
h+='<div class="gp-val">'+getAvailGp()+' <span style="font-size:14px;color:#C8A870">GP</span></div>';
h+='<div class="gp-avail">총 '+S.gp+' GP 획득</div>';
h+='</div>';
h+='<div class="gp-streak"><div class="gp-streak-num">'+getStreak()+'</div><div class="gp-streak-label">🔥 연속</div></div>';
h+='</div>';
return h;
}

// === WORKOUT TAB ===
function renderWorkout(){
var r=curRoutine();
var h='<div class="header"><h1>⚔️ 용사 길드 ⚔️</h1>';
h+='</div>';
// Guild Board
h+='<div class="guild-board"><div class="board-slots">';
var ci=S.idx%5;
for(var gi=0;gi<5;gi++){
var rt=getRoutineForCycle(S.idx-ci+gi);
var cls=gi===ci?'now':(gi<ci?'done-step':'');
var gp=rt.type==='cardio'?GP_STA:GP_STR;
h+='<div class="board-slot '+cls+'">'+rt.icon+' '+rt.name+' — '+gp+' GP</div>';
}
h+='</div></div>';
// GP + 교환 가능 보상 합친 카드
h+='<div class="gp-bar">';
h+='<div style="display:flex;align-items:center;gap:6px">';
h+='<div class="gp-coin">💰</div>';
h+='<div class="gp-val">'+getAvailGp()+' <span style="font-size:12px;color:var(--th)">길드포인트 (GP)</span></div>';
h+='<span style="font-size:9px;color:var(--th)">(총 '+S.gp+')</span>';
h+='</div>';
h+='<div class="gp-streak"><div class="gp-streak-num">'+getStreak()+'</div><div class="gp-streak-label">🔥 연속</div></div>';
var exchangeable=S.shop.filter(function(it){return it.gpInvested<it.gpCost});
if(exchangeable.length>0){
h+='<div style="width:100%;border-top:1px solid rgba(200,168,112,.3);margin-top:8px;padding-top:8px">';

function archiveShopItem(idx){
var item=S.shop[idx];
if(!item||!item.unlocked)return;
if(!confirm(item.name+' 을(를) 아카이브로 이동할까요?'))return;
if(!S.archivedShop)S.archivedShop=[];
S.archivedShop.push({name:item.name,img:item.img,price:item.price,gpCost:item.gpCost});
S.shop.splice(idx,1);save();render();
toast('📦 '+item.name+' 아카이브 완료!');
}
function investGp(idx,amount){
var item=S.shop[idx];
var actual=Math.min(amount,getAvailGp(),item.gpCost-item.gpInvested);
if(actual<=0)return;
item.gpInvested+=actual;S.spentGp+=actual;save();
if(item.gpInvested>=item.gpCost&&!item.unlocked){
item.unlocked=true;save();
showConfetti();showConfetti(true);
toast('🎉 '+item.name+' 해금 완료!');
} else {
toast('💰 '+actual+' GP 투자!');
}
render();
}

function saveEditItem(idx){
var item=S.shop[idx];
item.name=document.getElementById('editName').value.trim()||item.name;
item.price=document.getElementById('editPrice').value.trim();
if(!item.unlocked){
var newGp=parseInt(document.getElementById('editGpCost').value);
if(!isNaN(newGp)&&newGp>0){
if(newGp<item.gpInvested){S.spentGp-=(item.gpInvested-newGp);item.gpInvested=newGp;}
item.gpCost=newGp;
}
}
save();closeModal();render();toast('수정 완료!');
}
function deleteShopItem(idx){

function drawChart(){
var canvas=document.getElementById('wtCanvas');if(!canvas)return;
var ctx=canvas.getContext('2d');var dpr=window.devicePixelRatio||1;
canvas.width=canvas.offsetWidth*dpr;canvas.height=200*dpr;ctx.scale(dpr,dpr);
var W=canvas.offsetWidth,H=200;var data=S.weights.slice(-20);
var vals=data.map(function(w){return w.kg});
var minV=Math.min.apply(null,vals);var maxV=Math.max.apply(null,vals);
var min=Math.floor(minV)-1;var max=Math.ceil(maxV)+1;var range=max-min||1;
var padL=40,padR=10,padT=15,padB=25;var gw=W-padL-padR,gh=H-padT-padB;
ctx.strokeStyle='rgba(200,184,154,0.3)';ctx.lineWidth=1;
for(var v=min;v<=max;v++){var y=padT+(max-v)/range*gh;ctx.beginPath();ctx.moveTo(padL,y);ctx.lineTo(W-padR,y);ctx.stroke();ctx.fillStyle='#A89880';ctx.font='10px sans-serif';ctx.textAlign='right';ctx.fillText(v,padL-4,y+3);}
ctx.beginPath();ctx.strokeStyle='#D4A017';ctx.lineWidth=2.5;ctx.lineJoin='round';
data.forEach(function(w,i){var x=padL+i/(data.length-1)*gw;var y=padT+(max-w.kg)/range*gh;if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);});
ctx.stroke();
data.forEach(function(w,i){var x=padL+i/(data.length-1)*gw;var y=padT+(max-w.kg)/range*gh;ctx.beginPath();ctx.arc(x,y,4,0,Math.PI*2);ctx.fillStyle='#D4A017';ctx.fill();ctx.beginPath();ctx.arc(x,y,2,0,Math.PI*2);ctx.fillStyle='#fff';ctx.fill();});
ctx.fillStyle='#A89880';ctx.font='9px sans-serif';ctx.textAlign='center';
[0,Math.floor(data.length/2),data.length-1].forEach(function(i){if(!data[i])return;var x=padL+i/(data.length-1)*gw;ctx.fillText(data[i].date.split('.').slice(1).join('/'),x,H-5);});
}

h+='<div class="gp-gain-sub">'+label+' — 성공 보수 수령!</div>';
h+='<div style="margin:8px 0;display:flex;justify-content:center;gap:12px">';
h+='<div style="text-align:center;padding:6px 12px;background:var(--sf);border-radius:4px;border:1px solid var(--border)"><div style="font-size:16px;font-weight:900;color:var(--gold2);font-family:\'DotGothic16\',sans-serif">'+getAvailGp()+'</div><div style="font-size:9px;color:var(--th)">보유 GP</div></div>';
h+='<div style="text-align:center;padding:6px 12px;background:var(--sf);border-radius:4px;border:1px solid var(--border)"><div style="font-size:16px;font-weight:900;color:#FF8C42;font-family:\'DotGothic16\',sans-serif">'+streak+'</div><div style="font-size:9px;color:var(--th)">🔥 연속</div></div>';
h+='</div>';
h+='<div class="complete-comment">📜 '+comment+'</div>';
h+='<div class="done-btns" style="margin-top:8px;gap:4px">';
h+='<button class="btn-gold" style="padding:10px;font-size:13px" onclick="closeCompletePopup();nextRoutine(true)">바로 다음 미션 →</button>';
h+='<button class="btn-ghost" style="padding:8px;font-size:12px" onclick="closeCompletePopup();nextRoutine(false)">다음에 할게요</button>';
h+='<button class="btn-skip" style="padding:6px;font-size:11px" onclick="closeCompletePopup();goBack()">↩ 되돌리기</button>';
h+='</div></div></div>';
document.getElementById('modal').innerHTML=h;showConfetti();
}
function closeCompletePopup(){closeModal()}

// === SWAP ===
function showSwapConfirm(exIdx){
var swaps=getSwapsUsed();var left=SWAP_MAX-swaps;var r=curRoutine();var ex=r.exercises[exIdx];
var h='<div class="modal-bg" onclick="if(event.target===this)closeModal()"><div class="modal-box">';
if(left<=0){h+='<h3>변경 소진!</h3><p>이번 달 변경 '+SWAP_MAX+'번을 다 썼어요.</p>';
h+='<div class="modal-btns"><button style="background:var(--gold);color:#2C1810" onclick="closeModal()">알겠어요</button></div>';
} else {h+='<h3>'+ex.name+' 변경? 🔄</h3><span class="skip-count" style="font-size:24px;font-weight:900;color:var(--gold2);display:block;margin:6px 0;font-family:\'DotGothic16\',sans-serif">남은 변경: '+left+'번</span>';
h+='<div class="modal-btns"><button style="background:var(--sf);color:var(--tm)" onclick="closeModal()">유지</button><button style="background:var(--gold);color:#2C1810" onclick="doSwap('+exIdx+')">변경!</button></div>';}
h+='</div></div>';document.getElementById('modal').innerHTML=h;
}
function doSwap(exIdx){
var cats=['compound','hinge',null,'core'];var catName=cats[exIdx];
if(catName===null) catName=POOL.pull.some(function(e){return e.name===curRoutine().exercises[exIdx].name})?'pull':'push';
var pool=POOL[catName];var cur=curRoutine().exercises[exIdx].name;
var others=pool.filter(function(e){return e.name!==cur});
if(!others.length){closeModal();toast('다른 운동이 없어요!');return;}
var pick=others[Math.floor(Math.random()*others.length)];
S.swapped[S.idx+'_'+exIdx]=pick;
for(var s=0;s<10;s++){delete S.sets[exIdx+'_'+s]}
var mk=curMonthKey();S.swaps[mk]=(S.swaps[mk]||0)+1;
save();closeModal();toast('🔄 '+pick.name+'(으)로 변경!');render();
}

// === CROP ===
function showCropModal(src,mode){
var h='<div class="crop-modal"><div class="crop-title">드래그로 위치 조정 ✂️</div>';
h+='<div class="crop-area" id="cropArea"><img id="cropImg" src="'+src+'"></div>';
h+='<div class="crop-btns"><button class="crop-cancel" onclick="closeModal()">취소</button><button class="crop-save" onclick="saveCrop(\''+mode+'\')">완료 ✨</button></div></div>';
document.getElementById('modal').innerHTML=h;
var img=document.getElementById('cropImg');
img.onload=function(){
var area=document.getElementById('cropArea');var aw=area.offsetWidth,ah=area.offsetHeight;
var iw=img.naturalWidth,ih=img.naturalHeight;var scale=iw/ih>1?ah/ih:aw/iw;
img.style.width=(iw*scale)+'px';img.style.height=(ih*scale)+'px';
img.style.left=((aw-iw*scale)/2)+'px';img.style.top=((ah-ih*scale)/2)+'px';
var sx,sy,sl,st;
function onS(e){e.preventDefault();var p=e.touches?e.touches[0]:e;sx=p.clientX;sy=p.clientY;sl=parseFloat(img.style.left)||0;st=parseFloat(img.style.top)||0;}
function onM(e){if(sx===undefined)return;e.preventDefault();var p=e.touches?e.touches[0]:e;img.style.left=(sl+p.clientX-sx)+'px';img.style.top=(st+p.clientY-sy)+'px';}
function onE(){sx=undefined}
area.addEventListener('touchstart',onS,{passive:false});area.addEventListener('touchmove',onM,{passive:false});area.addEventListener('touchend',onE);
area.addEventListener('mousedown',onS);area.addEventListener('mousemove',onM);area.addEventListener('mouseup',onE);
};
}
function saveCrop(mode){
var img=document.getElementById('cropImg');var canvas=document.createElement('canvas');
canvas.width=180;canvas.height=180;var ctx=canvas.getContext('2d');
var l=parseFloat(img.style.left)||0;var t=parseFloat(img.style.top)||0;
var dw=parseFloat(img.style.width);var dh=parseFloat(img.style.height);
ctx.drawImage(img,-l/dw*img.naturalWidth,-t/dh*img.naturalHeight,180/dw*img.naturalWidth,180/dh*img.naturalHeight,0,0,180,180);
var dataUrl=canvas.toDataURL('image/jpeg',0.85);
if(mode==='addItem'&&window._tempItem){
S.shop.push({id:Date.now(),name:window._tempItem.name,img:dataUrl,price:window._tempItem.price,gpCost:window._tempItem.gpCost,gpInvested:0,unlocked:false});
window._tempItem=null;save();closeModal();toast('🎁 보상 등록 완료!');
if(curTab!==1){curTab=1;switchTab(1);}else render();
} else closeModal();
}

function closeModal(){document.getElementById('modal').innerHTML=''}
function showConfetti(fromBottom){
var c=document.createElement('div');c.className='confetti';
var colors=['#D4A017','#FFD700','#E8C020','#4A6FA5','#5B9A3A','#C0392B','#FF8C42'];
for(var i=0;i<40;i++){var p=document.createElement('div');p.className='confetti-piece'+(fromBottom?' from-bottom':'');p.style.left=Math.random()*100+'%';p.style.background=colors[Math.floor(Math.random()*colors.length)];p.style.animationDelay=Math.random()+'s';p.style.width=(4+Math.random()*6)+'px';p.style.height=(4+Math.random()*6)+'px';c.appendChild(p);}
document.body.appendChild(c);setTimeout(function(){c.remove()},3000);
}
function exportBackup(){var d=JSON.stringify(S,null,2);var b=new Blob([d],{type:'application/json'});var u=URL.createObjectURL(b);var a=document.createElement('a');a.href=u;a.download='guild-backup-'+new Date().toISOString().slice(0,10)+'.json';a.click();URL.revokeObjectURL(u);toast('백업 완료! 📦');}
function importBackup(input){var f=input.files[0];if(!f)return;var r=new FileReader();r.onload=function(e){try{var d=JSON.parse(e.target.result);if(confirm('기존 데이터를 덮어쓸까요?')){S=d;save();render();toast('복원 완료! 📥');}}catch(err){toast('파일 오류!');}};r.readAsText(f);}
function resetData(){if(!confirm('정말 전체 리셋?'))return;if(!confirm('되돌릴 수 없어요!'))return;localStorage.removeItem('wk_prince');location.reload();}

// migrate
S.history.forEach(function(h){if(!h.year){var p=h.date.split('/');var n=new Date();h.month=parseInt(p[0])-1;h.day=parseInt(p[1]);h.year=n.getFullYear();}});
save();render();
</script>
</body>
